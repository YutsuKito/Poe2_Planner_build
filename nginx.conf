# =====================================================================
# nginx.conf — PoE2 Build Planner
# Modo: path /build-planner no domínio poe2.primetech.dev.br via NPM
#
# Cole o bloco abaixo no "Custom Nginx Configuration" do Proxy Host
# existente no Nginx Proxy Manager (poe2.primetech.dev.br)
# =====================================================================

# --- Coloque este bloco no "Advanced" do Proxy Host no NPM ---
#
# location /build-planner {
#     alias /var/www/poe2-build-planner;
#     index index.html;
#     try_files $uri $uri/ /build-planner/index.html;
#
#     # Cache para assets pesados
#     location ~* \.(json|png|jpg|jpeg|gif|ico|svg)$ {
#         alias /var/www/poe2-build-planner;
#         expires 7d;
#         add_header Cache-Control "public, immutable";
#     }
#     location ~* \.(js|css)$ {
#         alias /var/www/poe2-build-planner;
#         expires 1d;
#         add_header Cache-Control "public";
#     }
# }
# ---------------------------------------------------------------

# =====================================================================
# Configuração standalone (porta 8083) — usada pelo NPM como backend
# =====================================================================
server {
    listen 8083;
    listen [::]:8083;

    root /var/www/poe2-build-planner;
    index index.html;

    # O NPM vai servir em /build-planner — ajustamos o base path aqui
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache para JSONs grandes (tree.json 1.8MB, passives 900KB)
    location ~* \.(json)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.(png|jpg|jpeg|gif|ico|svg)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.(js|css)$ {
        expires 1d;
        add_header Cache-Control "public";
    }

    # Gzip — fundamental para servir os 2.7MB de JSONs com velocidade
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json;

    access_log /var/log/nginx/poe2-build-planner.access.log;
    error_log  /var/log/nginx/poe2-build-planner.error.log;
}
