server {
    listen 80;
    listen [::]:80;

    # Troque pelo seu domínio ou IP da VPS
    server_name _;

    root /var/www/poe2-build-planner;
    index index.html;

    # Serve arquivos estáticos diretamente
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache agressivo para assets estáticos (JSONs grandes, imagens, JS, CSS)
    location ~* \.(json|png|jpg|jpeg|gif|ico|svg)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.(js|css)$ {
        expires 1d;
        add_header Cache-Control "public";
    }

    # Compressão gzip (melhora muito o carregamento dos JSONs de 2.7MB)
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json;

    # Segurança básica
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    # Logs
    access_log /var/log/nginx/poe2-build-planner.access.log;
    error_log  /var/log/nginx/poe2-build-planner.error.log;
}
